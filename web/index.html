<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NES Emulator</title>
    <link rel="stylesheet" href="style.css">
    <script src="output.js"></script>
    <script src="controls.js" defer></script>
    <script src="game.js" defer></script>
</head>
<body>
    <nav>
        <label for="fileInput" id="loadBtn">Load ROM</label>
        <button id="pauseBtn">Pause</button>
        <button id="settingsBtn">Keys</button>
    </nav>

    <div id="canvasWrap">
        <canvas id="myCanvas" width="768" height="672"></canvas>
        <div id="noGameOverlay">
            <label for="fileInput" id="overlayLoad">Load ROM</label>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".nes" hidden>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2>Key Bindings</h2>
            <div id="keyMappingContainer"></div>
            <div class="modal-actions">
                <button id="resetKeysBtn">Reset</button>
                <button id="closeSettingsBtn">Close</button>
            </div>
        </div>
    </div>
</body>
</html>
