<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NES Emulator</title>
    <link rel="stylesheet" href="style.css">
    <script src="output.js"></script>
    <script src="controls.js" defer></script>
    <script src="game.js" defer></script>
</head>
<body>
    <nav>
        <span class="nav-group">
            <label for="fileInput" id="loadBtn">ROM</label>
            <button id="pauseBtn">Pause</button>
        </span>
        <span class="nav-group">
            <button id="settingsBtn">Keys</button>
            <button id="touchToggle">Touch</button>
        </span>
    </nav>

    <div id="canvasWrap">
        <div id="dpad">
            <button class="d-btn" data-key="up">▲</button>
            <button class="d-btn" data-key="left">◄</button>
            <button class="d-btn" data-key="right">►</button>
            <button class="d-btn" data-key="down">▼</button>
        </div>

        <canvas id="myCanvas" width="768" height="672"></canvas>

        <div id="actions">
            <button class="act-btn" data-key="a">A</button>
            <button class="act-btn" data-key="b">B</button>
        </div>

        <button class="corner-btn" id="selectBtn" data-key="select">Sel</button>
        <button class="corner-btn" id="startBtn" data-key="start">Sta</button>

        <div id="noGameOverlay">
            <label for="fileInput" id="overlayLoad">Load ROM</label>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".nes" hidden>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2>Key Bindings</h2>
            <div id="keyMappingContainer"></div>
            <div class="modal-actions">
                <button id="resetKeysBtn">Reset</button>
                <button id="closeSettingsBtn">Close</button>
            </div>
        </div>
    </div>
</body>
</html>
